version: "3.9"

# Minimal stack for integration tests — no server, just backing services.

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaultguard_test
      POSTGRES_PASSWORD: vaultguard_test
      POSTGRES_DB: vaultguard_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultguard_test"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
