apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vaultsecrets.vaultguard.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: vaultguard.io
  names:
    kind: VaultSecret
    listKind: VaultSecretList
    plural: vaultsecrets
    singular: vaultsecret
    shortNames:
      - vs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Path
          type: string
          jsonPath: .spec.path
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Last Sync
          type: string
          jsonPath: .status.lastSyncTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required: [path, destination]
              properties:
                path:
                  type: string
                  description: Vaultguard vault path (namespace/mount/path)
                refreshInterval:
                  type: string
                  default: "1h"
                  description: How often to re-sync from Vaultguard
                destination:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    type:
                      type: string
                      default: Opaque
                vaultguardRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                ready:
                  type: boolean
                lastSyncTime:
                  type: string
                  format: date-time
                lastSyncVersion:
                  type: integer
                  format: int32
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, reason, message, lastTransitionTime]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
